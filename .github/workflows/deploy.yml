name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Set this to your default branch name
  pull_request:
    branches:
      - main

permissions:
  contents: read # Default: least-privilege for PR runs

jobs:
  build-and-lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies 🔧
        # 'npm ci' is faster and safer than 'npm install' for CI environments
        run: npm ci

      - name: Build Project 🏗️
        # This runs "vite build" as defined in your package.json
        run: npm run build

      - name: Upload dist artifact 📦
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI 💡
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-lighthouse
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Required to push to gh-pages branch
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Download dist artifact 📦
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to gh-pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite builds to 'dist' by default
          branch: gh-pages